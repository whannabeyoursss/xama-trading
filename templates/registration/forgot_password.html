{% extends 'base.html' %}

{% block content %}
<section class="auth-card">
    <div class="auth-brand">
        <h1>XAMA</h1>
        <p>CONSUMER GOODS TRADING</p>
        <h2>Forgot password</h2>
    </div>
    <p class="auth-copy">Enter your registered phone number. Numbers only.</p>
    <form method="post">
        {% csrf_token %}
        <p>
            <label for="{{ form.phone_number.id_for_label }}">Phone number</label>
            {{ form.phone_number }}
            {{ form.phone_number.errors }}
        </p>
        <button type="submit">Send code</button>
    </form>
    <div class="auth-divider"><span>remembered your password?</span></div>
    <a class="button outline full-width" href="{% url 'login' %}">Back to Sign In &rarr;</a>
</section>
{% endblock %}
